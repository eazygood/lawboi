services:
  db-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lawboi
      POSTGRES_USER: lawboi
      POSTGRES_PASSWORD: lawboi
    volumes:
      - pg_test_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawboi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_test_data:
